name: Go

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: 00 4 * * *

jobs:
  gc:
    name: build (${{ matrix.go }}, ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Cross-compilation became possible in go1.5 with the removal of C
          # code from the compiler. See https://go.dev/doc/go1.5#c.
          - arch: x64
            go: '1.3'
          - arch: x64
            go: '1.4'
        arch:
          - armv6
          - armv7
          - aarch64
          - s390x
          - 386
          - x64
        go:
          - '1.5'
          - '1.6'
          - '1.7'
          - '1.8'
          - '1.9'
          - '1.10'
          - '1.11'
          - '1.12'
          - '1.13'
          - '1.14'
          - '1.15'
          - '1.16'
          - '1.17'
          - '1.18'
          - '1.19'
          - '1.20'
          - '1.21'
          - '1.22'
          - '1.23'
          - '1.24'
          - '1.25'
          - '1.26'
        exclude:
          # Support for s390x was added in Go1.7. See https://go.dev/doc/go1.7#ports.
          - arch: s390x
            go: '1.5'
          - arch: s390x
            go: '1.6'

    steps:
      - uses: actions/checkout@v7
      # TODO(https://github.com/actions/setup-go/issues/756): Remove this step
      # and the cache input below when upstream stops warning about missing
      # cache paths for Go versions that predate caching.
      - name: Configure setup-go
        id: configure_setup_go
        shell: bash
        run: |
          set -euo pipefail

          IFS=. read -r major minor _ <<< "${{ matrix.go }}"
          cache=true
          if (( major == 1 && minor < 10 )); then
            cache=false
          fi
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: ${{ steps.configure_setup_go.outputs.cache }}
      - name: Configure environment
        id: configure_environment
        shell: bash
        run: |
          set -euxo pipefail

          case ${{ matrix.arch }} in
            armv6)
              echo GOARCH=arm >> "$GITHUB_ENV"
              echo GOARM=6 >> "$GITHUB_ENV"
              ;;
            armv7)
              echo GOARCH=arm >> "$GITHUB_ENV"
              echo GOARM=7 >> "$GITHUB_ENV"
              ;;
            aarch64)
              echo GOARCH=arm64 >> "$GITHUB_ENV"
              ;;
            s390x)
              echo GOARCH=s390x >> "$GITHUB_ENV"
              ;;
            386)
              echo GOARCH=386 >> "$GITHUB_ENV"
              ;;
            x64)
              echo GOARCH=amd64 >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown architecture: ${{ matrix.arch }}"
              exit 1
              ;;
          esac

          version_ge() {
            version=$1

            printf "$version\n%s\n" ${{ matrix.go }} | sort -V | head -n1 | xargs test "$version" =
          }

          # Race builds are pretty much busted on Go 1.4 and below on systems with newer C
          # compilers. A number of fixes were backported to go1.4-bootstrap but not any released
          # version. See https://github.com/golang/go/compare/go1.4.3...release-branch.go1.4.
          if ! version_ge 1.5; then
            echo "RACE_BUILDS_BROKEN=1" >> "$GITHUB_OUTPUT"
          fi

          # Go binaries built with Go 1.8 and below are incompatible with QEMU user-level emulation.
          # See https://github.com/golang/go/commit/2673f9e.
          if version_ge 1.9; then
            echo "QEMU_EMULATION_WORKS=1" >> "$GITHUB_OUTPUT"
          fi

          if version_ge 1.12; then
            # Better inlining in Go 1.12. See https://go.dev/doc/go1.12#compiler.
            echo "BETTER_INLINING_AVAILABLE=1" >> "$GITHUB_OUTPUT"

            # Race detector support on linux/arm64 was added in go1.12. See
            # https://go.dev/doc/go1.12.
            echo "ARM64_RACE_SUPPORTED=1" >> "$GITHUB_OUTPUT"
          fi

          if version_ge 1.19; then
            # Race detector support on linux/s390x was added in go1.19. See
            # https://go.dev/doc/go1.19.
            echo "S390X_RACE_SUPPORTED=1" >> "$GITHUB_OUTPUT"
          fi

          # Race detector binaries crash with:
          #
          # FATAL: ThreadSanitizer: unsupported VMA range
          #
          # See https://github.com/golang/go/issues/29948.
          echo "ARM64_UNSUPPORTED_VMA_RANGE=1" >> "$GITHUB_OUTPUT"

          # Race detector binaries crash with:
          #
          # ==17==ERROR: ThreadSanitizer failed to allocate 0x7f0000 (8323072) bytes at address 9000001a0000 (errno: 12)
          #
          # See https://github.com/golang/go/issues/67881.
          echo "S390X_THREAD_SANITIZER_FAILED_TO_ALLOCATE=1" >> "$GITHUB_OUTPUT"
      - name: Check that Get is inlined
        if: |
          steps.configure_environment.outputs.BETTER_INLINING_AVAILABLE
        shell: bash
        run: |
          set -euxo pipefail

          go build -gcflags='-m' 2>&1 | grep 'can inline Get$' > /dev/null
      - name: go build & go test -c
        shell: bash
        run: |
          set -euxo pipefail

          go build -v ./...
          go test -c -o goid.test ./...
      - name: go build & go test -c (race)
        # Race builds aren't supported on linux/386.
        id: build_goid_race_test
        if: |
          !cancelled() &&
          matrix.arch == 'x64' &&
          !steps.configure_environment.outputs.RACE_BUILDS_BROKEN
        shell: bash
        run: |
          set -euxo pipefail

          go build -v -race ./...
          go test -c -race -o goid.race.test ./...
      - name: Set up Zig
        id: setup_zig
        if: |
          !cancelled() &&
          (
            matrix.arch == 'aarch64' &&
            steps.configure_environment.outputs.ARM64_RACE_SUPPORTED ||
            matrix.arch == 's390x' &&
            steps.configure_environment.outputs.S390X_RACE_SUPPORTED
          )
        uses: mlugg/setup-zig@v2
        with:
          version: latest
          use-cache: false
      - name: go build & go test -c (race)
        id: build_goid_race_test_cross
        if: |
          !cancelled() &&
          steps.setup_zig.outcome == 'success'
        shell: bash
        run: |
          set -euxo pipefail

          # Non-host *.syso files are missing from the Go toolchains provided
          # by setup-go. See https://github.com/actions/setup-go/issues/181.
          race_syso="$(go env GOROOT)/src/runtime/race/race_linux_${GOARCH}.syso"
          curl --fail --location --output "$race_syso" -- \
            "https://github.com/golang/go/raw/refs/tags/go${{ steps.setup-go.outputs.go-version }}/src/runtime/race/race_linux_${GOARCH}.syso"
          # Zig classifies linker inputs by suffix; zig-cc rewrites the
          # downloaded .syso path to this hard-linked .o alias.
          ln -- "$race_syso" "$race_syso.o"

          export CGO_ENABLED=1
          export ZIG_TARGET=${{ matrix.arch }}-linux-gnu
          export CC="$GITHUB_WORKSPACE/.github/zig-cc"

          # Zig resolves the target runtime, so let it perform the final link.
          go build -v -race -ldflags='-linkmode=external' -- ./...
          go test -c -race -ldflags='-linkmode=external' -o goid.race.test -- ./...
      - run: rm goid.race.test
        if: |
          !cancelled() &&
          (steps.build_goid_race_test.outcome == 'success' || steps.build_goid_race_test_cross.outcome == 'success') &&
          (
            matrix.arch == 'aarch64' &&
            steps.configure_environment.outputs.ARM64_RACE_SUPPORTED &&
            steps.configure_environment.outputs.ARM64_UNSUPPORTED_VMA_RANGE
          ) || (
            matrix.arch == 's390x' &&
            steps.configure_environment.outputs.S390X_RACE_SUPPORTED &&
            steps.configure_environment.outputs.S390X_THREAD_SANITIZER_FAILED_TO_ALLOCATE
          )
      # The test binaries are static, so binfmt can run them directly on the
      # host. setup-qemu also caches the binfmt image for Docker Hub outages.
      - name: Set up QEMU
        id: setup_qemu
        if: |
          !cancelled() &&
          matrix.arch != '386' &&
          matrix.arch != 'x64' &&
          steps.configure_environment.outputs.QEMU_EMULATION_WORKS
        uses: docker/setup-qemu-action@v4
      - name: Run tests
        if: |
          !cancelled() &&
          (
            matrix.arch == '386' ||
            matrix.arch == 'x64' ||
            steps.setup_qemu.outcome == 'success'
          )
        shell: bash
        run: |
          set -euxo pipefail

          find . -name '*.test' -type f -executable -print0 | \
            xargs -t -0 -I '{}' sh -c '{} -test.v && {} -test.bench=. -test.benchmem -test.v'

  gccgo:
    name: build (${{ matrix.versions }}, x64)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # gccgo cross-compilation requires a target-specific GCC toolchain
        # rather than GOARCH, so only native x64 builds are included here.
        versions:
          - gccgo-9 gccgo-10 gccgo-11 gccgo-12 gccgo-13 gccgo-14 gccgo-15 gccgo-16
    outputs:
      results: ${{ steps.run.outputs.results }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up gccgo
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install --yes -- ${{ matrix.versions }}

      # Race builds aren't supported in gccgo.
      - name: Build and run tests
        id: run
        shell: bash
        run: |
          set -euxo pipefail

          # Keep running after a failure so the report retains each version's result.
          status=0
          results=
          for compiler in ${{ matrix.versions }}; do
            if ln --symbolic --force -- "/usr/bin/${compiler#gcc}" /usr/local/bin/go &&
              go version &&
              go build -v ./... &&
              go test -c -o goid.test ./... &&
              ./goid.test -test.v &&
              ./goid.test -test.bench=. -test.benchmem -test.v
            then
              result=success
            else
              result=failure
              status=1
            fi
            results+="$compiler=$result "
          done
          echo "results=${results% }" >> "$GITHUB_OUTPUT"
          exit "$status"

  report:
    name: build status
    if: ${{ always() }}
    needs: [gc, gccgo]
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                filter: 'latest',
                per_page: 100,
              },
            );

            // The coalesced gccgo job still reports each compiler separately.
            const groupedResults = new Map(
              '${{ needs.gccgo.outputs.results }}'
                .split(' ')
                .filter(Boolean)
                .map(result => result.split('=', 2)),
            );
            const builds = new Map();
            const architectureSet = new Set();
            for (const job of jobs) {
              const match = /^build \(([^,]+), ([^)]+)\)$/.exec(job.name);
              if (!match) {
                continue;
              }

              const [, versionList, architecture] = match;
              for (const version of versionList.split(' ')) {
                if (!builds.has(version)) {
                  builds.set(version, new Map());
                }
                const conclusion = groupedResults.get(version);
                builds.get(version).set(
                  architecture,
                  conclusion ? {...job, conclusion} : job,
                );
              }
              architectureSet.add(architecture);
            }
            if (builds.size === 0) {
              throw new Error('No matrix build jobs found');
            }

            const architectures = [...architectureSet].sort();
            const versions = [...builds.keys()].sort((a, b) => {
              const aGccgo = a.startsWith('gccgo-');
              const bGccgo = b.startsWith('gccgo-');
              if (aGccgo !== bGccgo) {
                return aGccgo ? 1 : -1;
              }

              const aParts = a.replace('gccgo-', '').split('.').map(Number);
              const bParts = b.replace('gccgo-', '').split('.').map(Number);
              return bParts[0] - aParts[0] || (bParts[1] || 0) - (aParts[1] || 0);
            });

            const symbols = {
              action_required: '⚠️',
              cancelled: '⏹️',
              failure: '❌',
              in_progress: '⏳',
              neutral: '➖',
              queued: '⏳',
              skipped: '⏭️',
              stale: '➖',
              startup_failure: '❌',
              success: '✅',
              timed_out: '⏱️',
              waiting: '⏳',
            };
            const summary = [
              '## Build status',
              '',
              `Results for [${context.sha.slice(0, 7)}](${context.payload.repository.html_url}/commit/${context.sha}).`,
              '',
              `| Go | ${architectures.join(' | ')} |`,
              `| --- | ${architectures.map(() => '---').join(' | ')} |`,
            ];
            const readme = summary.slice(4);

            for (const version of versions) {
              const summaryCells = [];
              const readmeCells = [];
              for (const architecture of architectures) {
                const job = builds.get(version).get(architecture);
                if (!job) {
                  summaryCells.push('—');
                  readmeCells.push('—');
                  continue;
                }

                const conclusion = job.conclusion || job.status;
                const symbol = symbols[conclusion] || '❔';
                summaryCells.push(`[${symbol}](${job.html_url} "${conclusion}")`);
                readmeCells.push(
                  conclusion === 'success'
                    ? symbol
                    : `[${symbol}](${job.html_url} "${conclusion}")`,
                );
              }
              summary.push(`| ${version} | ${summaryCells.join(' | ')} |`);
              readme.push(`| ${version} | ${readmeCells.join(' | ')} |`);
            }

            const legend = '✅ success · ❌ failure · ⏹️ cancelled · ⏭️ skipped · — not in matrix';
            summary.push('', legend);
            readme.push('', legend);
            await core.summary.addRaw(summary.join('\n')).write();

            const branch = context.payload.repository.default_branch;
            if (context.eventName === 'pull_request' || context.ref !== `refs/heads/${branch}`) {
              return;
            }

            const { data: branchData } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
            });
            if (branchData.commit.sha !== context.sha) {
              core.notice('Skipping README update because the workflow commit is no longer current.');
              return;
            }

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              ref: branch,
            });
            if (Array.isArray(file) || file.type !== 'file' || !file.content) {
              throw new Error('README.md is not a file');
            }

            const contents = Buffer.from(file.content, 'base64').toString();
            const start = '<!-- build-status:start -->';
            const end = '<!-- build-status:end -->';
            const startIndex = contents.indexOf(start);
            const endIndex = contents.indexOf(end, startIndex);
            if (startIndex === -1 || endIndex === -1) {
              throw new Error('README.md build status markers are missing');
            }

            const block = `${start}\n${readme.join('\n')}\n${end}`;
            const updated = contents.slice(0, startIndex) + block + contents.slice(endIndex + end.length);
            if (updated === contents) {
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              branch,
              message: 'ci: update build status grid',
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
