name: Go

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: 00 4 * * *

permissions:
  contents: read

jobs:
  prepare:
    name: prepare test runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'
          check-latest: true
          cache: false
      - name: Test and build test runner
        shell: bash
        run: |
          set -euxo pipefail

          go test ./.github/run-tests/...
          go build -o run-tests ./.github/run-tests
      - uses: actions/upload-artifact@v7
        with:
          name: run-tests
          path: run-tests
          overwrite: true

  build:
    name: build (${{ matrix.go }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - '1.3'
          - '1.4'
          - '1.5'
          - '1.6'
          - '1.7'
          - '1.8'
          - '1.9'
          - '1.10'
          - '1.11'
          - '1.12'
          - '1.13'
          - '1.14'
          - '1.15'
          - '1.16'
          - '1.17'
          - '1.18'
          - '1.19'
          - '1.20'
          - '1.21'
          - '1.22'
          - '1.23'
          - '1.24'
          - '1.25'
          - '1.26'
          - gccgo-9
          - gccgo-10
          - gccgo-11
          - gccgo-12
          - gccgo-13
          - gccgo-14

    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: run-tests
      - name: Configure test runner
        shell: bash
        run: chmod +x run-tests
      - name: Plan build
        shell: bash
        run: |
          set -euxo pipefail

          ./run-tests plan \
            -go '${{ matrix.go }}' \
            -attempt '${{ github.run_attempt }}' \
            -output 'build-status-${{ matrix.go }}.json'
      # TODO(https://github.com/actions/setup-go/issues/756): Remove this step
      # and the cache input below when upstream stops warning about missing
      # cache paths for Go versions that predate caching.
      - name: Configure setup-go
        id: configure_setup_go
        if: ${{ !startsWith(matrix.go, 'gccgo-') }}
        shell: bash
        run: |
          set -euo pipefail

          IFS=. read -r major minor _ <<< "${{ matrix.go }}"
          cache=true
          if (( major == 1 && minor < 10 )); then
            cache=false
          fi
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
      - name: Set up Go
        id: setup-go
        if: ${{ !startsWith(matrix.go, 'gccgo-') }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: ${{ steps.configure_setup_go.outputs.cache }}
      - name: Set up gccgo
        if: ${{ startsWith(matrix.go, 'gccgo-') }}
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y ${{ matrix.go }}
          echo ${{ matrix.go }} | sed 's/^gcc//' | xargs -I % ln -s /usr/bin/% /usr/local/bin/go

          go version
      - name: Build and run tests
        shell: bash
        run: |
          set -euxo pipefail

          ./run-tests run \
            -go '${{ matrix.go }}' \
            -attempt '${{ github.run_attempt }}' \
            -output 'build-status-${{ matrix.go }}.json'
      - name: Upload build status
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: build-status-${{ matrix.go }}
          path: build-status-${{ matrix.go }}.json
          if-no-files-found: error
          overwrite: true

  report:
    name: build status
    if: ${{ always() }}
    needs:
      - prepare
      - build
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-status-*
          path: build-status
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: run-tests
      - name: Configure test runner
        shell: bash
        run: chmod +x run-tests
      - uses: actions/github-script@v9
        with:
          script: |
            const {execFileSync} = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const symbols = {
              action_required: '⚠️',
              cancelled: '⏹️',
              failure: '❌',
              in_progress: '⏳',
              neutral: '➖',
              pending: '⏳',
              queued: '⏳',
              skipped: '⏭️',
              stale: '➖',
              startup_failure: '❌',
              success: '✅',
              timed_out: '⏱️',
              waiting: '⏳',
            };
            const producerStatuses = new Set([
              'failure',
              'not_applicable',
              'pending',
              'success',
            ]);

            function parseResult(file) {
              let result;
              try {
                result = JSON.parse(fs.readFileSync(file, 'utf8'));
              } catch (err) {
                throw new Error(`Invalid build status ${file}: ${err.message}`);
              }
              if (result.schema !== 1) {
                throw new Error(`Unsupported build status schema in ${file}`);
              }
              if (typeof result.go !== 'string' || result.go.length === 0) {
                throw new Error(`Missing Go version in ${file}`);
              }
              if (!Number.isSafeInteger(result.run_attempt) || result.run_attempt <= 0) {
                throw new Error(`Invalid run attempt in ${file}`);
              }
              if (!result.results || typeof result.results !== 'object' || Array.isArray(result.results)) {
                throw new Error(`Missing architecture results in ${file}`);
              }
              const entries = Object.entries(result.results);
              if (entries.length === 0) {
                throw new Error(`Empty architecture results in ${file}`);
              }
              for (const [architecture, status] of entries) {
                if (architecture.length === 0 || typeof status !== 'string' || !producerStatuses.has(status)) {
                  throw new Error(`Invalid ${architecture || 'architecture'} result in ${file}`);
                }
              }
              return result;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                filter: 'all',
                per_page: 100,
              },
            );

            const builds = new Map();
            for (const job of jobs) {
              const match = /^build \(([^)]+)\)$/.exec(job.name);
              if (!match) {
                continue;
              }

              const version = match[1];
              if (!Number.isSafeInteger(job.run_attempt) || job.run_attempt <= 0) {
                throw new Error(`Invalid run attempt for ${version}`);
              }
              const previous = builds.get(version);
              if (!previous || job.run_attempt > previous.job.run_attempt) {
                builds.set(version, {job});
              } else if (job.run_attempt === previous.job.run_attempt) {
                throw new Error(
                  `Duplicate build job for ${version} attempt ${job.run_attempt}`,
                );
              }
            }
            if (builds.size === 0) {
              throw new Error('No matrix build jobs found');
            }

            const artifacts = new Map();
            const artifactEntries = fs.existsSync('build-status')
              ? fs.readdirSync('build-status', {withFileTypes: true})
              : [];
            for (const entry of artifactEntries) {
              if (!entry.isFile() || path.extname(entry.name) !== '.json') {
                continue;
              }
              const file = path.join('build-status', entry.name);
              const result = parseResult(file);
              if (artifacts.has(result.go)) {
                throw new Error(`Duplicate build status for ${result.go}`);
              }
              artifacts.set(result.go, result);
            }
            for (const version of artifacts.keys()) {
              if (!builds.has(version)) {
                throw new Error(`Build status has no matching job for ${version}`);
              }
            }

            const architectureSet = new Set();
            for (const [version, build] of builds) {
              let result = artifacts.get(version);
              if (!result || result.run_attempt !== build.job.run_attempt) {
                if (result) {
                  core.notice(
                    `Ignoring build status for ${version} from attempt ${result.run_attempt}; ` +
                    `the latest job is from attempt ${build.job.run_attempt}.`,
                  );
                }
                const fallback = path.join(
                  process.env.RUNNER_TEMP,
                  `build-status-${version}-${build.job.run_attempt}.json`,
                );
                execFileSync(
                  './run-tests',
                  [
                    'plan',
                    '-go', version,
                    '-attempt', String(build.job.run_attempt),
                    '-output', fallback,
                  ],
                  {stdio: 'inherit'},
                );
                result = parseResult(fallback);
              }
              if (result.go !== version) {
                throw new Error(`Build status version does not match job for ${version}`);
              }
              if (result.run_attempt !== build.job.run_attempt) {
                throw new Error(`Build status attempt does not match job for ${version}`);
              }

              const conclusion = build.job.conclusion || build.job.status;
              build.results = new Map();
              const entries = Object.entries(result.results);
              const applicable = entries.filter(([, status]) => status !== 'not_applicable');
              if (applicable.length === 0) {
                throw new Error(`No applicable architectures for ${version}`);
              }
              const overrideSuccess =
                conclusion !== 'success' &&
                applicable.every(([, status]) => status === 'success');
              for (const [architecture, reportedStatus] of entries) {
                let status = reportedStatus;
                if (status === 'pending') {
                  if (conclusion === 'success') {
                    throw new Error(`Successful build for ${version} has a pending ${architecture} result`);
                  }
                  status = conclusion;
                } else if (
                  conclusion === 'success' &&
                  status !== 'success' &&
                  status !== 'not_applicable'
                ) {
                  throw new Error(`Successful build for ${version} has ${status} for ${architecture}`);
                } else if (overrideSuccess && status === 'success') {
                  status = conclusion;
                }
                if (!symbols[status] && status !== 'not_applicable') {
                  throw new Error(`Cannot render ${status} for ${version}/${architecture}`);
                }
                build.results.set(architecture, status);
                architectureSet.add(architecture);
              }
            }

            const architectures = [...architectureSet].sort();
            const versions = [...builds.keys()].sort((a, b) => {
              const aGccgo = a.startsWith('gccgo-');
              const bGccgo = b.startsWith('gccgo-');
              if (aGccgo !== bGccgo) {
                return aGccgo ? 1 : -1;
              }

              const aParts = a.replace('gccgo-', '').split('.').map(Number);
              const bParts = b.replace('gccgo-', '').split('.').map(Number);
              return bParts[0] - aParts[0] || (bParts[1] || 0) - (aParts[1] || 0);
            });

            const summary = [
              '## Build status',
              '',
              `Results for [${context.sha.slice(0, 7)}](${context.payload.repository.html_url}/commit/${context.sha}).`,
              '',
              `| Go | ${architectures.join(' | ')} |`,
              `| --- | ${architectures.map(() => '---').join(' | ')} |`,
            ];
            const readme = summary.slice(4);

            for (const version of versions) {
              const summaryCells = [];
              const readmeCells = [];
              for (const architecture of architectures) {
                const build = builds.get(version);
                const status = build.results.get(architecture);
                if (status === 'not_applicable') {
                  summaryCells.push('—');
                  readmeCells.push('—');
                  continue;
                }
                if (!status) {
                  throw new Error(`Missing ${architecture} result for ${version}`);
                }

                const symbol = symbols[status];
                const link = `[${symbol}](${build.job.html_url} "${status}")`;
                summaryCells.push(link);
                readmeCells.push(
                  status === 'success'
                    ? symbol
                    : link,
                );
              }
              summary.push(`| ${version} | ${summaryCells.join(' | ')} |`);
              readme.push(`| ${version} | ${readmeCells.join(' | ')} |`);
            }

            const legend = '✅ success · ❌ failure · ⏹️ cancelled · ⏭️ skipped · — not in matrix';
            summary.push('', legend);
            readme.push('', legend);
            await core.summary.addRaw(summary.join('\n')).write();

            const branch = context.payload.repository.default_branch;
            if (context.eventName === 'pull_request' || context.ref !== `refs/heads/${branch}`) {
              return;
            }

            const { data: branchData } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
            });
            if (branchData.commit.sha !== context.sha) {
              core.notice('Skipping README update because the workflow commit is no longer current.');
              return;
            }

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              ref: branch,
            });
            if (Array.isArray(file) || file.type !== 'file' || !file.content) {
              throw new Error('README.md is not a file');
            }

            const contents = Buffer.from(file.content, 'base64').toString();
            const start = '<!-- build-status:start -->';
            const end = '<!-- build-status:end -->';
            const startIndex = contents.indexOf(start);
            const endIndex = contents.indexOf(end, startIndex);
            if (startIndex === -1 || endIndex === -1) {
              throw new Error('README.md build status markers are missing');
            }

            const block = `${start}\n${readme.join('\n')}\n${end}`;
            const updated = contents.slice(0, startIndex) + block + contents.slice(endIndex + end.length);
            if (updated === contents) {
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              branch,
              message: 'ci: update build status grid',
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
