name: Go

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: 00 4 * * *

permissions:
  contents: read

jobs:
  build:
    # Each job reuses one toolchain setup while run-tests checks all
    # architectures concurrently and reports their individual results.
    name: build (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - '1.5'
          - '1.6'
          - '1.7'
          - '1.8'
          - '1.9'
          - '1.10'
          - '1.11'
          - '1.12'
          - '1.13'
          - '1.14'
          - '1.15'
          - '1.16'
          - '1.17'
          - '1.18'
          - '1.19'
          - '1.20'
          - '1.21'
          - '1.22'
          - '1.23'
          - '1.24'
          - '1.25'
          - '1.26'
    steps:
      - uses: actions/checkout@v7
      # run-tests uses current Go independently of the historical toolchain
      # that it drives below.
      - name: Set up runner Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: stable
          cache: false
      - run: go build -o run-tests -- ./.github/run-tests
      # TODO(https://github.com/actions/setup-go/issues/756): Remove this step
      # and the cache input below when upstream stops warning about missing
      # cache paths for Go versions that predate caching.
      - name: Configure setup-go
        id: configure_setup_go
        shell: bash
        run: |
          set -euo pipefail

          IFS=. read -r major minor _ <<< "${{ matrix.go }}"
          cache=true
          if (( major == 1 && minor < 10 )); then
            cache=false
          fi
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: ${{ steps.configure_setup_go.outputs.cache }}
      - name: Configure runner
        id: configure_runner
        shell: bash
        run: |
          set -euo pipefail

          IFS=. read -r _ minor _ <<< "${{ matrix.go }}"
          if (( minor >= 9 )); then
            echo "qemu=1" >> "$GITHUB_OUTPUT"
          fi
          if (( minor >= 12 )); then
            echo "zig=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Zig
        if: ${{ steps.configure_runner.outputs.zig }}
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: latest
          use-cache: false
      # The test binaries are static, so binfmt can run them directly on the
      # host. setup-qemu also caches the binfmt image for Docker Hub outages.
      - name: Set up QEMU
        if: ${{ steps.configure_runner.outputs.qemu }}
        continue-on-error: true
        uses: docker/setup-qemu-action@v4
      - name: Run tests
        run: |
          set -euxo pipefail

          ./run-tests \
            --output 'build-status-${{ github.run_attempt }}-${{ matrix.go }}.json' \
            --version '${{ matrix.go }}' \
            --go "$(command -v go)" \
            --release '${{ steps.setup-go.outputs.go-version }}' \
            --
      - if: ${{ always() && hashFiles('build-status-*.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: build-status-${{ github.run_attempt }}-${{ matrix.go }}
          path: build-status-${{ github.run_attempt }}-${{ matrix.go }}.json

  legacy:
    name: build (${{ matrix.go }}, x64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - '1.3'
          - '1.4'
          - gccgo-9
          - gccgo-10
          - gccgo-11
          - gccgo-12
          - gccgo-13
          - gccgo-14
    steps:
      - uses: actions/checkout@v7
      # TODO(https://github.com/actions/setup-go/issues/756): Remove this step
      # and the cache input below when upstream stops warning about missing
      # cache paths for Go versions that predate caching.
      - name: Configure setup-go
        id: configure_setup_go
        if: ${{ !startsWith(matrix.go, 'gccgo-') }}
        shell: bash
        run: |
          set -euo pipefail

          IFS=. read -r major minor _ <<< "${{ matrix.go }}"
          cache=true
          if (( major == 1 && minor < 10 )); then
            cache=false
          fi
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
      - name: Set up Go
        if: ${{ !startsWith(matrix.go, 'gccgo-') }}
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: ${{ steps.configure_setup_go.outputs.cache }}
      - name: Set up gccgo
        if: ${{ startsWith(matrix.go, 'gccgo-') }}
        shell: bash
        run: |
          set -euxo pipefail

          compiler='${{ matrix.go }}'
          sudo apt update
          sudo apt install --yes -- "$compiler"
          sudo ln --symbolic -- "/usr/bin/go-${compiler#gccgo-}" /usr/local/bin/go
          go version
      - name: go build & go test -c
        shell: bash
        run: |
          set -euxo pipefail

          go build -v ./...
          go test -c -o goid.test ./...
      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail

          ./goid.test -test.v
          ./goid.test -test.bench=. -test.benchmem -test.v

  report:
    name: build status
    if: ${{ always() }}
    needs: [build, legacy]
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-status-*
          path: build-status
          merge-multiple: true
      - uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                filter: 'latest',
                per_page: 100,
              },
            );

            const builds = new Map();
            const architectureSet = new Set();
            const runnerJobs = new Map();
            for (const job of jobs) {
              let match = /^build \(([^,]+), ([^)]+)\)$/.exec(job.name);
              if (match) {
                const [, version, architecture] = match;
                if (!builds.has(version)) {
                  builds.set(version, new Map());
                }
                builds.get(version).set(architecture, {
                  conclusion: job.conclusion || job.status,
                  url: job.html_url,
                });
                architectureSet.add(architecture);
                continue;
              }
              match = /^build \(([^)]+)\)$/.exec(job.name);
              if (match) {
                if (runnerJobs.has(match[1])) {
                  throw new Error(`Duplicate build for ${match[1]}`);
                }
                runnerJobs.set(match[1], job);
              }
            }
            if (runnerJobs.size === 0) {
              throw new Error('No runner build jobs found');
            }

            let runnerArchitectures;
            for (const [version, job] of runnerJobs) {
              const file = path.join(
                'build-status',
                `build-status-${job.run_attempt}-${version}.json`,
              );
              if (!fs.existsSync(file)) {
                throw new Error(`Missing build status for ${version}`);
              }
              const results = JSON.parse(fs.readFileSync(file, 'utf8'));
              const names = Object.keys(results).sort();
              if (names.length === 0) {
                throw new Error(`No architectures for ${version}`);
              }
              if (runnerArchitectures && names.join() !== runnerArchitectures.join()) {
                throw new Error(`Architecture mismatch for ${version}`);
              }
              runnerArchitectures = names;
              const failed = Object.values(results).includes('failure');
              const expected = failed ? 'failure' : 'success';
              if (job.conclusion !== expected) {
                throw new Error(`Build status disagrees with ${job.name}`);
              }
              const build = new Map();
              for (const [architecture, conclusion] of Object.entries(results)) {
                if (!['success', 'failure', 'not_applicable'].includes(conclusion)) {
                  throw new Error(`Invalid ${version}/${architecture}: ${conclusion}`);
                }
                build.set(architecture, {conclusion, url: job.html_url});
                architectureSet.add(architecture);
              }
              builds.set(version, build);
            }
            const architectures = [...architectureSet].sort();
            const versions = [...builds.keys()].sort((a, b) => {
              const aGccgo = a.startsWith('gccgo-');
              const bGccgo = b.startsWith('gccgo-');
              if (aGccgo !== bGccgo) {
                return aGccgo ? 1 : -1;
              }

              const aParts = a.replace('gccgo-', '').split('.').map(Number);
              const bParts = b.replace('gccgo-', '').split('.').map(Number);
              return bParts[0] - aParts[0] || (bParts[1] || 0) - (aParts[1] || 0);
            });

            const symbols = {
              action_required: '⚠️',
              cancelled: '⏹️',
              failure: '❌',
              in_progress: '⏳',
              neutral: '➖',
              queued: '⏳',
              skipped: '⏭️',
              stale: '➖',
              startup_failure: '❌',
              success: '✅',
              timed_out: '⏱️',
              waiting: '⏳',
            };
            const summary = [
              '## Build status',
              '',
              `Results for [${context.sha.slice(0, 7)}](${context.payload.repository.html_url}/commit/${context.sha}).`,
              '',
              `| Go | ${architectures.join(' | ')} |`,
              `| --- | ${architectures.map(() => '---').join(' | ')} |`,
            ];
            const readme = summary.slice(4);

            for (const version of versions) {
              const summaryCells = [];
              const readmeCells = [];
              for (const architecture of architectures) {
                const result = builds.get(version).get(architecture);
                if (!result || result.conclusion === 'not_applicable') {
                  summaryCells.push('—');
                  readmeCells.push('—');
                  continue;
                }

                const symbol = symbols[result.conclusion] || '❔';
                summaryCells.push(`[${symbol}](${result.url} "${result.conclusion}")`);
                readmeCells.push(
                  result.conclusion === 'success'
                    ? symbol
                    : `[${symbol}](${result.url} "${result.conclusion}")`,
                );
              }
              summary.push(`| ${version} | ${summaryCells.join(' | ')} |`);
              readme.push(`| ${version} | ${readmeCells.join(' | ')} |`);
            }

            const legend = '✅ success · ❌ failure · ⏹️ cancelled · ⏭️ skipped · — not in matrix';
            summary.push('', legend);
            readme.push('', legend);
            await core.summary.addRaw(summary.join('\n')).write();

            const branch = context.payload.repository.default_branch;
            if (context.eventName === 'pull_request' || context.ref !== `refs/heads/${branch}`) {
              return;
            }

            const { data: branchData } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
            });
            if (branchData.commit.sha !== context.sha) {
              core.notice('Skipping README update because the workflow commit is no longer current.');
              return;
            }

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              ref: branch,
            });
            if (Array.isArray(file) || file.type !== 'file' || !file.content) {
              throw new Error('README.md is not a file');
            }

            const contents = Buffer.from(file.content, 'base64').toString();
            const start = '<!-- build-status:start -->';
            const end = '<!-- build-status:end -->';
            const startIndex = contents.indexOf(start);
            const endIndex = contents.indexOf(end, startIndex);
            if (startIndex === -1 || endIndex === -1) {
              throw new Error('README.md build status markers are missing');
            }

            const block = `${start}\n${readme.join('\n')}\n${end}`;
            const updated = contents.slice(0, startIndex) + block + contents.slice(endIndex + end.length);
            if (updated === contents) {
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              branch,
              message: 'ci: update build status grid',
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
