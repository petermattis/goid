name: Go

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: 00 4 * * *

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.versions }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # A cell shares one hosted runner across all listed versions. The
          # toolchains download together, then run sequentially; pairing old
          # and new releases amortizes startup while balancing shard runtimes.
          - versions: '1.26 1.5'
          - versions: '1.25 1.6'
          - versions: '1.24 1.7'
          - versions: '1.23 1.8'
          - versions: '1.22 1.9'
          - versions: '1.21 1.10'
          - versions: '1.20 1.11'
          - versions: '1.19 1.12'
          - versions: '1.18 1.13'
          - versions: '1.17 1.14'
          - versions: '1.16 1.15'
          # Go 1.3 and 1.4 have no golang.org/dl wrappers, so the go key marks
          # cells that setup-go must provision.
          - versions: '1.3'
            go: '1.3'
          - versions: '1.4'
            go: '1.4'
          - versions: gccgo-9 gccgo-10 gccgo-11 gccgo-12 gccgo-13 gccgo-14
            gccgo: true
    steps:
      - uses: actions/checkout@v7.0.0
      - run: go build -o run-tests ./.github/run-tests
      - if: ${{ !matrix.go && !matrix.gccgo }}
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2
          use-cache: false
      # TODO(https://github.com/actions/setup-go/issues/756): Remove the cache
      # input below when upstream stops warning about missing cache paths for
      # Go versions that predate caching.
      - name: Set up Go
        if: ${{ matrix.go }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: false
      - name: Set up gccgo
        if: ${{ matrix.gccgo }}
        run: |
          set -euxo pipefail

          sudo apt update
          sudo apt install -y gccgo-9 gccgo-10 gccgo-11 gccgo-12 gccgo-13 gccgo-14
      - name: Run downloaded tests
        if: ${{ !matrix.go && !matrix.gccgo }}
        run: |
          set -euxo pipefail

          ./run-tests run \
            -attempt "$GITHUB_RUN_ATTEMPT" \
            -output 'build-status-${{ strategy.job-index }}.json' \
            -bootstrap-go "$(command -v go)" \
            ${{ matrix.versions }}
      - name: Run setup-go tests
        if: ${{ matrix.go }}
        run: |
          set -euxo pipefail

          GOROOT="$(go env GOROOT)"
          export GOROOT
          ./run-tests run \
            -attempt "$GITHUB_RUN_ATTEMPT" \
            -output 'build-status-${{ strategy.job-index }}.json' \
            "${{ matrix.versions }}=$(command -v go)"
      - name: Run gccgo tests
        if: ${{ matrix.gccgo }}
        run: |
          set -euxo pipefail

          ./run-tests run \
            -attempt "$GITHUB_RUN_ATTEMPT" \
            -output 'build-status-${{ strategy.job-index }}.json' \
            gccgo-9=/usr/bin/go-9 \
            gccgo-10=/usr/bin/go-10 \
            gccgo-11=/usr/bin/go-11 \
            gccgo-12=/usr/bin/go-12 \
            gccgo-13=/usr/bin/go-13 \
            gccgo-14=/usr/bin/go-14
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-status-${{ strategy.job-index }}
          path: build-status-${{ strategy.job-index }}.json
          if-no-files-found: ignore
          overwrite: true

  report:
    name: build status
    if: ${{ always() }}
    needs: build
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: go test ./.github/run-tests && go build -o run-tests ./.github/run-tests
      - uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          pattern: build-status-*
          path: build-status
          merge-multiple: true
      - uses: actions/github-script@v9.0.0
        with:
          script: |
            const {execFileSync} = require('child_process');
            const fs = require('fs');
            const path = require('path');

            function read(file) {
              const value = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!value || value.schema !== 1 || !Number.isSafeInteger(value.run_attempt) ||
                  value.run_attempt <= 0 || !value.results ||
                  typeof value.results !== 'object' || Array.isArray(value.results)) {
                throw new Error(`Invalid build status ${file}`);
              }
              return value;
            }

            const versions = [
              ...Array.from({length: 24}, (_, index) => `1.${26 - index}`),
              ...Array.from({length: 6}, (_, index) => `gccgo-${14 - index}`),
            ];
            const expectedVersions = new Set(versions);

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              filter: 'all',
              per_page: 100,
            });
            const latest = new Map();
            for (const job of jobs) {
              const match = /^build \(([^)]+)\)$/.exec(job.name);
              if (!match) continue;
              const previous = latest.get(job.name);
              if (!previous || job.run_attempt > previous.job.run_attempt) {
                latest.set(job.name, {job, versions: match[1].split(' ')});
              } else if (job.run_attempt === previous.job.run_attempt) {
                throw new Error(`Duplicate ${job.name} attempt ${job.run_attempt}`);
              }
            }

            const builds = new Map();
            const shards = [...latest.values()];
            const shardsByVersions = new Map();
            for (const shard of shards) {
              if (shard.job.conclusion === 'skipped') throw new Error(`Skipped ${shard.job.name}`);
              shard.key = [...shard.versions].sort().join('\n');
              for (const version of shard.versions) {
                if (builds.has(version)) throw new Error(`Duplicate build for ${version}`);
                builds.set(version, {job: shard.job, shard});
              }
              shardsByVersions.set(shard.key, shard);
            }
            const unexpectedVersions = [...builds.keys()]
              .filter(version => !expectedVersions.has(version));
            const missingVersions = [...expectedVersions]
              .filter(version => !builds.has(version));
            if (unexpectedVersions.length !== 0 || missingVersions.length !== 0) {
              throw new Error(
                'Build version coverage mismatch. ' +
                `Unexpected: ${unexpectedVersions.join(', ') || 'none'}. ` +
                `Missing: ${missingVersions.join(', ') || 'none'}.`,
              );
            }

            const files = fs.existsSync('build-status') ? fs.readdirSync('build-status') : [];
            for (const name of files.filter(name => name.endsWith('.json')).sort()) {
              const value = read(path.join('build-status', name));
              const key = Object.keys(value.results).sort().join('\n');
              const shard = shardsByVersions.get(key);
              if (!shard) throw new Error(`Unexpected build status shard ${name}`);
              if (value.run_attempt !== shard.job.run_attempt) continue;
              if (shard.value) throw new Error(`Duplicate build status for ${shard.job.name}`);
              shard.value = value;
            }

            const producer = new Set(['pending', 'success', 'failure', 'not_applicable']);
            let architectures;
            for (const shard of shards) {
              let value = shard.value;
              if (!value) {
                const output = path.join(process.env.RUNNER_TEMP, `plan-${shard.job.id}.json`);
                execFileSync('./run-tests', [
                  'plan', '-attempt', String(shard.job.run_attempt), '-output', output,
                  ...shard.versions,
                ], {stdio: 'inherit'});
                value = read(output);
                const key = Object.keys(value.results).sort().join('\n');
                if (value.run_attempt !== shard.job.run_attempt || key !== shard.key) {
                  throw new Error(`Invalid fallback for ${shard.job.name}`);
                }
              }
              for (const [version, results] of Object.entries(value.results)) {
                const build = builds.get(version);
                if (!results || typeof results !== 'object' || Array.isArray(results)) {
                  throw new Error(`Invalid results for ${version}`);
                }
                const names = Object.keys(results).sort();
                const statuses = Object.values(results);
                if (!names.length || names.some(name => !name) ||
                    !statuses.some(status => status !== 'not_applicable')) {
                  throw new Error(`No applicable architectures for ${version}`);
                }
                if (architectures && names.join() !== architectures.join()) {
                  throw new Error(`Architecture mismatch for ${version}`);
                }
                if (statuses.some(status => !producer.has(status))) throw new Error(`Invalid ${version}`);
                architectures = names;
                build.results = results;
              }
              shard.allSuccess = shard.versions.every(version =>
                Object.values(builds.get(version).results)
                  .filter(status => status !== 'not_applicable')
                  .every(status => status === 'success'));
            }

            const symbols = {
              action_required: '⚠️',
              cancelled: '⏹️',
              failure: '❌',
              neutral: '➖',
              skipped: '⏭️',
              stale: '➖',
              startup_failure: '❌',
              success: '✅',
              timed_out: '⏱️',
            };
            const summary = [
              '## Build status',
              '',
              `Results for [${context.sha.slice(0, 7)}](${context.payload.repository.html_url}/commit/${context.sha}).`,
              '',
              `| Go | ${architectures.join(' | ')} |`,
              `| --- | ${architectures.map(() => '---').join(' | ')} |`,
            ];
            const readme = summary.slice(4);

            for (const version of versions) {
              const build = builds.get(version);
              const conclusion = build.job.conclusion || build.job.status;
              const summaryCells = [];
              const readmeCells = [];
              for (const architecture of architectures) {
                let status = build.results[architecture];
                if (status === 'not_applicable') {
                  summaryCells.push('—');
                  readmeCells.push('—');
                  continue;
                }
                if (status === 'pending') {
                  if (conclusion === 'success') {
                    throw new Error(`Pending ${version}/${architecture}`);
                  }
                  status = conclusion;
                } else if (conclusion === 'success' && status === 'failure') {
                  throw new Error(`Successful job reported failure for ${version}/${architecture}`);
                } else if (build.shard.allSuccess && conclusion !== 'success') {
                  status = conclusion;
                }
                const symbol = symbols[status];
                if (!symbol) {
                  throw new Error(`Cannot render ${status}`);
                }
                const link = `[${symbol}](${build.job.html_url} "${status}")`;
                summaryCells.push(link);
                readmeCells.push(status === 'success' ? symbol : link);
              }
              summary.push(`| ${version} | ${summaryCells.join(' | ')} |`);
              readme.push(`| ${version} | ${readmeCells.join(' | ')} |`);
            }

            const legend = '✅ success · ❌ failure · ⏹️ cancelled · ⏭️ skipped · — not in matrix';
            summary.push('', legend);
            readme.push('', legend);
            await core.summary.addRaw(summary.join('\n')).write();

            const branch = context.payload.repository.default_branch;
            if (context.eventName === 'pull_request' || context.ref !== `refs/heads/${branch}`) {
              return;
            }

            const { data: branchData } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
            });
            if (branchData.commit.sha !== context.sha) {
              core.notice('Skipping README update because the workflow commit is no longer current.');
              return;
            }

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              ref: branch,
            });
            if (Array.isArray(file) || file.type !== 'file' || !file.content) {
              throw new Error('README.md is not a file');
            }

            const contents = Buffer.from(file.content, 'base64').toString();
            const start = '<!-- build-status:start -->';
            const end = '<!-- build-status:end -->';
            const startIndex = contents.indexOf(start);
            const endIndex = contents.indexOf(end, startIndex);
            if (startIndex === -1 || endIndex === -1) {
              throw new Error('README.md build status markers are missing');
            }

            const block = `${start}\n${readme.join('\n')}\n${end}`;
            const updated = contents.slice(0, startIndex) + block + contents.slice(endIndex + end.length);
            if (updated === contents) {
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              branch,
              message: 'ci: update build status grid',
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
